name: RAG Monitoring — Tests & Regression Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: hard gate — all 62 unit tests must pass ───────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=monitoring --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

      - name: Run demo (smoke test — no API keys needed)
        run: python scripts/demo_observability.py

  # ── Job 2: baseline recording + regression check (no external services) ──
  # Non-blocking: runs after unit tests, failures are informational only.
  # Langfuse connection errors are handled gracefully by the circuit breaker.
  regression-gate:
    name: Integration — Regression Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run demo with monitoring enabled (Langfuse offline — circuit breaker handles it)
        env:
          MONITOR_ENABLED: "true"
          MONITOR_LANGFUSE_HOST: http://localhost:3000
          MONITOR_LANGFUSE_SECRET_KEY: sk-lf-ci-key
          MONITOR_LANGFUSE_PUBLIC_KEY: pk-lf-ci-key
        run: python scripts/demo_observability.py

      - name: Record baseline
        env:
          MONITOR_ENABLED: "true"
          MONITOR_LANGFUSE_HOST: http://localhost:3000
          MONITOR_LANGFUSE_SECRET_KEY: sk-lf-ci-key
          MONITOR_LANGFUSE_PUBLIC_KEY: pk-lf-ci-key
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          python scripts/record_baseline.py --branch "$BRANCH" \
            --eval-summary eval-summary.json \
            --monitoring-summary monitoring-summary.json || true

      - name: Check regressions
        env:
          MONITOR_BASELINE_DIR: ${{ github.workspace }}/data/monitoring
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if [ -f "data/monitoring/baselines.json" ]; then
            python scripts/check_regressions.py --branch "$BRANCH"
          else
            echo "No baseline found — skipping regression check (first run on this branch)"
          fi

      - name: Upload monitoring artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-results
          path: |
            data/monitoring/
            eval-summary.json
            monitoring-summary.json

      - name: Post results as PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const evalPath = `${process.env.GITHUB_WORKSPACE}/eval-summary.json`;
            const monPath  = `${process.env.GITHUB_WORKSPACE}/monitoring-summary.json`;

            let body = '## Monitoring & Regression Report\n\n';

            if (fs.existsSync(evalPath)) {
              const evalData = JSON.parse(fs.readFileSync(evalPath, 'utf8'));
              body += '### Evaluation Results\n';
              body += '| Metric | Value |\n|--------|-------|\n';
              body += `| Pass Rate | ${(evalData.pass_rate * 100).toFixed(1)}% |\n`;
              body += `| Avg Faithfulness | ${evalData.avg_faithfulness.toFixed(4)} |\n`;
              body += `| Threshold Met | ${evalData.threshold_met} |\n`;
            }

            if (fs.existsSync(monPath)) {
              const monData = JSON.parse(fs.readFileSync(monPath, 'utf8'));
              body += '\n### Performance Metrics\n';
              body += '| Metric | Value |\n|--------|-------|\n';
              body += `| P50 Latency | ${monData.p50_latency.toFixed(3)}s |\n`;
              body += `| P95 Latency | ${monData.p95_latency.toFixed(3)}s |\n`;
              body += `| Avg Cost | $${monData.avg_cost.toFixed(5)} |\n`;
              body += `| Total Queries | ${monData.total_queries} |\n`;
              body += `| Errors | ${monData.errors} |\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
