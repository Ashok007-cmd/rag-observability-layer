name: RAG Monitoring — Regression Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  monitor:
    runs-on: ubuntu-latest

    services:
      langfuse:
        image: langfuse/langfuse:3
        ports:
          - 3000:3000
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/langfuse
          NEXTAUTH_SECRET: ci-nextauth-secret
          SALT: ci-salt
        options: >-
          --health-cmd "curl -f http://localhost:3000/api/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: langfuse
        options: >-
          --memory="1g"
          --memory-swap="1g"
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install monitoring dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r rag-observability-layer/requirements.txt

      - name: Install RAG pipeline dependencies
        working-directory: project-1-Production-Grade-RAG

        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Ingest sample documents
        working-directory: project-1-Production-Grade-RAG

        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAG_LLM_PROVIDER: openai
        run: |
          python scripts/ingest.py --source data/sample_docs --reset

      - name: Record baseline (if not exists for this branch)
        working-directory: rag-observability-layer
        env:
          MONITOR_LANGFUSE_HOST: http://localhost:3000
          MONITOR_LANGFUSE_SECRET_KEY: sk-lf-local-ci-key
          MONITOR_LANGFUSE_PUBLIC_KEY: pk-lf-local-ci-key
          MONITOR_ENABLED: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          python scripts/record_baseline.py --branch "$BRANCH"

      - name: Run evaluation with monitoring
        working-directory: project-1-Production-Grade-RAG

        env:
          MONITOR_LANGFUSE_HOST: http://localhost:3000
          MONITOR_LANGFUSE_SECRET_KEY: sk-lf-local-ci-key
          MONITOR_LANGFUSE_PUBLIC_KEY: pk-lf-local-ci-key
          MONITOR_ENABLED: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/evaluate.py \
            --hybrid \
            --reranker \
            --fail-on-threshold \
            --threshold 0.7 \
            --export-ci-summary

      - name: Check regressions
        working-directory: rag-observability-layer
        env:
          MONITOR_BASELINE_DIR: ${{ github.workspace }}/rag-observability-layer/data/monitoring
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          python scripts/check_regressions.py --branch "$BRANCH"

      - name: Upload monitoring artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-results
          path: |
            rag-observability-layer/data/monitoring/
            project-1-Production-Grade-RAG/data/eval_results/


      - name: Post results as PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const evalPath = `${process.env.GITHUB_WORKSPACE}/project-1-Production-Grade-RAG/eval-summary.json`;

            let body = '## Monitoring & Regression Report\n\n';
            if (fs.existsSync(evalPath)) {
              const evalData = JSON.parse(fs.readFileSync(evalPath, 'utf8'));
              body += '### Evaluation Results\n';
              body += '| Metric | Value |\n|--------|-------|\n';
              body += `| Pass Rate | ${(evalData.pass_rate * 100).toFixed(1)}% |\n`;
              body += `| Avg Faithfulness | ${evalData.avg_faithfulness.toFixed(4)} |\n`;
              body += `| Threshold Met | ${evalData.threshold_met} |\n`;
            } else {
              body += 'No eval-summary.json found.\n';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
